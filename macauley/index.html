<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>student greating system</title>
</head>
<body>
    <h1> STUDENT GREETING SYSTEM</h1>

    <label for="name"> Name:</label>
    <input id="name" type="text" placeholder="enter your name"><br><br>
    <button onclick="response()"> submit</button>
    <p id="reply"></p>

    <script>
        function response(){
            let name = document.querySelector("#name");
            let replying = document.querySelector("#reply");

            if (name.value === ""){

                replying.innerHTML="Type your name";
                replying.style.color="red";
            }
            else {
                replying.innerHTML="hello, " +name.value;
                replying.style.color="green";
            }


        }


    </script>
</body>
</html>
